<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康日志编辑器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 40;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      width: 100%;
      max-width: 400px;
      height: 100vh;
      background: white;
      transition: left 0.3s ease;
      z-index: 50;
      overflow-y: auto;
    }

    .sidebar.active {
      left: 0;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    @media (max-width: 640px) {
      .sidebar {
        max-width: 100%;
      }

      body {
        font-size: 14px;
      }

      .card-header {
        padding: 12px 16px !important;
      }

      .card-content {
        padding: 12px 16px !important;
        gap: 8px !important;
      }

      .card-title {
        font-size: 16px !important;
      }

      .card-btn {
        padding: 6px 10px !important;
        font-size: 12px !important;
      }

      .section-icon {
        font-size: 1.25rem !important;
      }

      .section-label {
        font-size: 12px !important;
      }

      .section-value {
        font-size: 14px !important;
        padding-left: 36px !important;
      }

      .special-tag {
        font-size: 11px !important;
        padding: 4px 8px !important;
      }

      .add-special-btn {
        padding: 4px 8px !important;
        font-size: 11px !important;
      }

      .form-input,
      .form-textarea {
        padding: 10px 12px !important;
        font-size: 14px !important;
      }

      .sidebar-form {
        padding: 16px !important;
        gap: 12px !important;
      }

      .sidebar-title {
        font-size: 18px !important;
      }

      .form-section-label {
        font-size: 13px !important;
      }

      .header-btn {
        padding: 8px 12px !important;
        font-size: 12px !important;
      }

      .page-title {
        font-size: 20px !important;
      }

      .modal-content {
        padding: 16px !important;
        margin: 16px !important;
        max-height: 90vh !important;
        overflow-y: auto !important;
      }

      .toast-message {
        padding: 12px 20px !important;
        font-size: 14px !important;
      }

      .pagination-btn {
        padding: 6px 12px !important;
        font-size: 12px !important;
        min-width: 36px !important;
      }
    }

    @media (max-width: 480px) {
      .header-actions {
        gap: 4px !important;
      }

      .refresh-btn,
      .save-btn {
        padding: 8px !important;
        font-size: 0 !important;
      }

      .refresh-btn::after {
        content: '🔄';
        font-size: 16px;
      }

      .save-btn::after {
        content: '💾';
        font-size: 16px;
      }

      .page-title {
        font-size: 18px !important;
      }

      .card-header {
        padding: 10px 14px !important;
      }

      .card-content {
        padding: 10px 14px !important;
      }

      .section-value {
        padding-left: 32px !important;
      }

      .special-notes-input {
        min-height: 60px !important;
      }
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">
  <div id="app" class="container mx-auto px-4 py-6 sm:py-8 max-w-4xl">
    <header class="mb-6 sm:mb-8 flex justify-between items-center">
      <div class="flex items-center gap-2 sm:gap-4">
        <button id="menuBtn" class="p-2 hover:bg-gray-200 rounded-lg transition-colors">
          <svg class="w-5 sm:w-6 h-5 sm:h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
        <h1 class="page-title text-xl sm:text-2xl md:text-3xl font-bold text-gray-800">📋 BioHacker_Editor</h1>
      </div>
      <div class="header-actions flex gap-1 sm:gap-2">
        <button id="settingsBtn"
          class="header-btn p-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors" title="设置">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426-1.756-2.924-1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
            </path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
            </path>
          </svg>
        </button>
        <button id="refreshBtn"
          class="refresh-btn header-btn px-2 sm:px-3 md:px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition-colors">
          🔄 刷新
        </button>
        <button id="saveAllBtn"
          class="save-btn header-btn px-2 sm:px-3 md:px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg text-sm font-medium transition-colors">
          💾 保存
        </button>
      </div>
    </header>

    <div id="toast"
      class="toast-message fixed top-4 left-1/2 transform -translate-x-1/2 px-4 sm:px-6 py-2 sm:py-3 rounded-lg shadow-lg text-white font-medium transition-all opacity-0 pointer-events-none z-50">
    </div>

    <main id="mainContent">
      <div id="loadingState" class="hidden text-center py-20">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent">
        </div>
        <p class="mt-4 text-gray-600">加载中...</p>
      </div>

      <div id="emptyState" class="hidden text-center py-20">
        <p class="text-gray-500 text-lg">暂无日志记录</p>
        <p class="text-gray-400 text-sm mt-2">请在设置中配置 GitHub 信息后加载日志</p>
        <button id="emptySettingsBtn"
          class="mt-6 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium transition-colors">
          ⚙️ 配置
        </button>
      </div>

      <div id="cardsContainer" class="grid gap-6"></div>

      <div id="paginationContainer" class="mt-6 flex justify-center items-center gap-2 flex-wrap"></div>
    </main>
  </div>

  <div id="settingsOverlay" class="modal-overlay">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">⚙️ 设置</h2>
        <button id="closeSettingsBtn" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Token</label>
          <input type="password" id="tokenInput"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <input type="text" id="usernameInput"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="your-username">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">仓库名</label>
          <input type="text" id="repoInput"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="health-log">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">文件路径</label>
          <input type="text" id="pathInput"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
            placeholder="health.txt">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">🏠 所在城市</label>
          <input type="text" id="postalCode" placeholder="如：深圳 或 南宁 青秀区"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <p class="text-xs text-gray-500 mt-1">用于查询当地天气</p>
        </div>

        <div class="pt-4 border-t border-gray-200">
          <button id="saveSettingsBtn"
            class="w-full px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-bold text-lg transition-colors">
            💾 保存设置
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <div id="sidebar" class="sidebar">
    <div class="p-3 sm:p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50 sticky top-0 z-10">
      <h2 class="sidebar-title text-lg sm:text-xl font-bold text-gray-800">➕ 添加新卡片</h2>
      <button id="closeSidebarBtn" class="p-2 hover:bg-gray-200 rounded-lg transition-colors">
        <svg class="w-5 sm:w-6 h-5 sm:h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <form id="addEntryForm" class="sidebar-form p-3 sm:p-4 space-y-3 sm:space-y-5">
      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">📅 日期</label>
        <input type="text" id="entryDate" required
          class="form-input w-full px-3 sm:px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">1. Weather:</label>
        <div class="space-y-1 sm:space-y-2">
          <input type="text" id="weatherDesc" placeholder="天气描述"
            class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
          <div class="flex items-center gap-2">
            <input type="text" id="weatherTempLow" placeholder="最低温"
              class="w-1/2 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <span class="text-gray-500">~</span>
            <input type="text" id="weatherTempHigh" placeholder="最高温"
              class="w-1/2 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <span class="text-gray-500">℃</span>
          </div>
          <button type="button" id="queryWeatherBtn"
            class="w-full px-3 sm:px-4 py-2 bg-cyan-500 hover:bg-cyan-600 text-white rounded-lg font-medium text-sm transition-colors flex items-center justify-center gap-2">
            <svg class="w-4 sm:w-5 h-4 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            📡 查询天气
          </button>
          <div id="weatherLoading" class="hidden text-center py-2">
            <div
              class="inline-block animate-spin rounded-full h-4 sm:h-5 w-4 sm:w-5 border-2 border-cyan-500 border-t-transparent">
            </div>
            <span class="ml-2 text-xs sm:text-sm text-gray-500">查询中...</span>
          </div>
        </div>
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">2. Sleep:</label>
        <div class="space-y-1 sm:space-y-2">
          <div class="flex items-center gap-2">
            <input type="text" id="sleepHour" placeholder="HH" maxlength="2"
              class="w-14 sm:w-16 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center">
            <span class="text-gray-500 text-xs sm:text-sm">:</span>
            <input type="text" id="sleepMin" placeholder="MM" maxlength="2"
              class="w-14 sm:w-16 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center">
            <span class="text-gray-500 text-xs sm:text-sm">睡着，</span>
            <input type="text" id="wakeHour" placeholder="HH" maxlength="2"
              class="w-14 sm:w-16 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center">
            <span class="text-gray-500 text-xs sm:text-sm">:</span>
            <input type="text" id="wakeMin" placeholder="MM" maxlength="2"
              class="w-14 sm:w-16 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-center">
          </div>
          <div class="flex gap-2">
            <button type="button" id="wakeTypeAwake"
              class="px-3 py-1 bg-blue-500 text-white rounded-lg text-xs sm:text-sm transition-colors">⚡ 苏醒</button>
            <button type="button" id="wakeTypeAlarm"
              class="px-3 py-1 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-xs sm:text-sm transition-colors">⏰
              闹钟</button>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-gray-600 text-xs sm:text-sm">备注:</span>
            <input type="text" id="sleepNote" placeholder="备注"
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">3. Diet:</label>
        <div class="space-y-1 sm:space-y-2">
          <div class="flex items-center gap-2">
            <span class="text-gray-600 text-xs sm:text-sm">午饭：</span>
            <input type="text" id="dietLunch" placeholder=""
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div class="flex items-center gap-2">
            <span class="text-gray-600 text-xs sm:text-sm">晚饭：</span>
            <input type="text" id="dietDinner" placeholder=""
              class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">4. Exercise:</label>
        <input type="text" id="exercise" placeholder=""
          class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">5. Note:</label>
        <textarea id="note" rows="2 sm:rows-3" placeholder=""
          class="form-textarea w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
      </div>

      <div>
        <label class="form-section-label block text-sm font-medium text-gray-700 mb-1 sm:mb-2">💡 特殊标识:</label>
        <input type="text" id="specialNoteText" placeholder="输入标注内容"
          class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none mb-2">
        <div class="flex flex-col gap-1.5 sm:gap-2">
          <button type="button" id="addSpecialPlus"
            class="w-full px-3 sm:px-4 py-1.5 sm:py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium text-sm transition-colors text-left">
            <span class="mr-2">鼓励</span> [+] 添加
          </button>
          <button type="button" id="addSpecialQuestion"
            class="w-full px-3 sm:px-4 py-1.5 sm:py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium text-sm transition-colors text-left">
            <span class="mr-2">观察</span> [?] 添加
          </button>
          <button type="button" id="addSpecialExclamation"
            class="w-full px-3 sm:px-4 py-1.5 sm:py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium text-sm transition-colors text-left">
            <span class="mr-2">问题</span> [!] 添加
          </button>
        </div>
        <div id="specialNotesList" class="mt-2 sm:mt-3 space-y-2"></div>
      </div>

      <div class="pt-3 sm:pt-4 border-t border-gray-200">
        <button type="submit"
          class="w-full px-4 sm:px-6 py-2.5 sm:py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-bold text-base sm:text-lg transition-colors">
          ✅ 提交
        </button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEYS = {
      token: 'github_token',
      username: 'github_username',
      repo: 'github_repo',
      path: 'github_path',
      fileSha: 'github_file_sha',
      postalCode: 'postal_code'
    };

    const CONFIG = {
      apiBase: 'https://api.github.com/repos'
    };

    const REGEX = {
      weather: /^(.+?)，(\d+)-(\d+)℃(?:\s*（(.+?)）)?$/,
      sleep: /^(\d{1,2}):(\d{2})\s*睡着，(\d{1,2}):(\d{2})\s*(苏醒|闹钟|自然醒)(?:\s*（(.+?)）)?$/,
      diet: /^午饭：(.+?)、晚饭：(.*)$/
    };

    const state = {
      config: {
        token: '',
        username: '',
        repo: '',
        path: ''
      },
      fileSha: '',
      entries: [],
      wakeType: '苏醒',
      formSpecialNotes: [],
      postalCode: '',
      currentPage: 1,
      pageSize: 7
    };

    function Storage() {
      return {
        get(key) {
          return localStorage.getItem(key) || '';
        },
        set(key, value) {
          localStorage.setItem(key, value);
        },
        loadConfig() {
          state.config.token = this.get(STORAGE_KEYS.token);
          state.config.username = this.get(STORAGE_KEYS.username);
          state.config.repo = this.get(STORAGE_KEYS.repo);
          state.config.path = this.get(STORAGE_KEYS.path);
          state.fileSha = this.get(STORAGE_KEYS.fileSha);
          state.postalCode = this.get(STORAGE_KEYS.postalCode) || '';
          document.getElementById('postalCode').value = state.postalCode;
        },
        saveConfig() {
          this.set(STORAGE_KEYS.token, state.config.token);
          this.set(STORAGE_KEYS.username, state.config.username);
          this.set(STORAGE_KEYS.repo, state.config.repo);
          this.set(STORAGE_KEYS.path, state.config.path);
        },
        saveLocation(locationStr) {
          state.postalCode = locationStr;
          this.set(STORAGE_KEYS.postalCode, locationStr);
        },
        saveSha(sha) {
          this.set(STORAGE_KEYS.fileSha, sha);
          state.fileSha = sha;
        },
        hasConfig() {
          return !!(state.config.token && state.config.username && state.config.repo && state.config.path);
        }
      };
    }

    function Toast() {
      let timeout = null;
      return {
        show(message, type = 'success') {
          const el = document.getElementById('toast');
          el.textContent = message;
          el.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white font-medium transition-all z-50 ${type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`;
          el.style.opacity = '1';
          el.style.pointerEvents = 'auto';
          if (timeout) clearTimeout(timeout);
          timeout = setTimeout(() => {
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
          }, 3000);
        }
      };
    }

    function Api() {
      const storage = Storage();
      return {
        async getFile() {
          const { token, username, repo, path } = state.config;
          const url = `${CONFIG.apiBase}/${username}/${repo}/contents/${path}`;
          const response = await fetch(url, {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json'
            }
          });
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || `HTTP ${response.status}`);
          }
          return await response.json();
        },

        async putFile(content, message) {
          const { token, username, repo, path } = state.config;
          const url = `${CONFIG.apiBase}/${username}/${repo}/contents/${path}`;
          const encodedContent = btoa(unescape(encodeURIComponent(content)));
          const body = {
            message,
            content: encodedContent,
            sha: state.fileSha
          };
          const response = await fetch(url, {
            method: 'PUT',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || `HTTP ${response.status}`);
          }
          return await response.json();
        }
      };
    }

    function Parser() {
      return {
        parseWeather(text) {
          if (!text || text === '，-℃') {
            return { description: '', tempLow: null, tempHigh: null, note: '' };
          }
          const match = text.match(REGEX.weather);
          if (match) {
            return {
              description: match[1],
              tempLow: parseInt(match[2]),
              tempHigh: parseInt(match[3]),
              note: match[4] || ''
            };
          }
          return { description: text, tempLow: null, tempHigh: null, note: '' };
        },

        parseSleep(text) {
          if (!text) {
            return { sleepTime: '', wakeTime: '', wakeType: '', note: '' };
          }

          const normalized = text.replace(/：/g, ':');
          const match = normalized.match(REGEX.sleep);
          if (match) {
            return {
              sleepTime: `${match[1]}:${match[2]}`,
              wakeTime: `${match[3]}:${match[4]}`,
              wakeType: match[5],
              note: match[6] || ''
            };
          }

          const noteMatch = text.match(/（(.+?)）/);
          return {
            sleepTime: '',
            wakeTime: '',
            wakeType: '',
            note: noteMatch ? noteMatch[1] : ''
          };
        },

        parseDiet(text) {
          if (!text || text === '午饭：、晚饭：') {
            return { lunch: '', dinner: '' };
          }
          const match = text.match(REGEX.diet);
          if (match) {
            return { lunch: match[1], dinner: match[2] };
          }
          return { lunch: '', dinner: text };
        },

        parse(text) {
          const entries = [];
          const datePattern = /^(\d{4}\.\d{1,2}\.\d{1,2})$/;
          const lines = text.split('\n');

          let currentEntry = null;

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            if (datePattern.test(line)) {
              if (currentEntry) {
                entries.push(currentEntry);
              }
              currentEntry = {
                date: line,
                weather: { description: '', tempLow: null, tempHigh: null, note: '' },
                sleep: { sleepTime: '', wakeTime: '', wakeType: '', note: '' },
                diet: { lunch: '', dinner: '' },
                exercise: '',
                note: '',
                specialNotes: []
              };
            } else if (currentEntry) {
              if (line.startsWith('Weather:')) {
                currentEntry.weather = this.parseWeather(line.replace('Weather:', '').trim());
              } else if (line.startsWith('Sleep:')) {
                currentEntry.sleep = this.parseSleep(line.replace('Sleep:', '').trim());
              } else if (line.startsWith('Diet:')) {
                currentEntry.diet = this.parseDiet(line.replace('Diet:', '').trim());
              } else if (line.startsWith('Exercise:')) {
                currentEntry.exercise = line.replace('Exercise:', '').trim();
              } else if (line.startsWith('Note:')) {
                currentEntry.note = line.replace('Note:', '').trim();
              } else if (line.startsWith('[!]')) {
                currentEntry.specialNotes.push({ type: '!', text: line.substring(4).trim() });
              } else if (line.startsWith('[?]')) {
                currentEntry.specialNotes.push({ type: '?', text: line.substring(4).trim() });
              } else if (line.startsWith('[+]')) {
                currentEntry.specialNotes.push({ type: '+', text: line.substring(4).trim() });
              }
            }
          }

          if (currentEntry) {
            entries.push(currentEntry);
          }

          return entries;
        }
      };
    }

    function Stringifier() {
      return {
        stringifyWeather(weather) {
          let result = weather.description;
          if (weather.tempLow !== null && weather.tempHigh !== null) {
            result += `，${weather.tempLow}-${weather.tempHigh}℃`;
          }
          if (weather.note) {
            result += ` （${weather.note}）`;
          }
          return `Weather: ${result}`;
        },

        stringifySleep(sleep) {
          if (!sleep.sleepTime && !sleep.wakeTime) {
            if (sleep.note) {
              return `Sleep: : 睡着，: 苏醒/闹钟（${sleep.note}）`;
            }
            return 'Sleep: : 睡着，: 苏醒/闹钟';
          }
          let result = `${sleep.sleepTime} 睡着，${sleep.wakeTime} ${sleep.wakeType}`;
          if (sleep.note) {
            result += `（${sleep.note}）`;
          }
          return `Sleep: ${result}`;
        },

        stringifyDiet(diet) {
          return `Diet: 午饭：${diet.lunch}、晚饭：${diet.dinner}`;
        },

        stringifyDateEntry(entry) {
          const lines = [
            entry.date,
            this.stringifyWeather(entry.weather),
            this.stringifySleep(entry.sleep),
            this.stringifyDiet(entry.diet),
            `Exercise: ${entry.exercise || ''}`,
            `Note: ${entry.note || ''}`
          ];

          entry.specialNotes.forEach(note => {
            lines.push(`[${note.type}] ${note.text}`);
          });

          return lines.join('\n');
        },

        stringifyAll(entries) {
          return entries.map(e => this.stringifyDateEntry(e)).join('\n\n');
        }
      };
    }

          if (state.currentPage > totalPages && totalPages > 0) {

          const startIndex = (state.currentPage - 1) * state.pageSize;
          const endIndex = startIndex + state.pageSize;
          const pageEntries = sortedEntries.slice(startIndex, endIndex);

          pageEntries.forEach((entry, index) => {

        renderPagination(totalItems) {
          const container = document.getElementById('paginationContainer');
          const totalPages = Math.ceil(totalItems / state.pageSize);

          if (totalPages <= 1) {
            container.innerHTML = '';
            return;
          }

          let html = '';

          if (state.currentPage > 1) {
            html += `<button class="pagination-prev px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded text-sm transition-colors">上一页</button>`;
          } else {
            html += `<button class="px-3 py-1 bg-gray-100 text-gray-400 rounded text-sm cursor-not-allowed">上一页</button>`;
          }

          const maxVisible = 5;
          let startPage = Math.max(1, state.currentPage - Math.floor(maxVisible / 2));
          let endPage = Math.min(totalPages, startPage + maxVisible - 1);

          if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
          }

          if (startPage > 1) {
            html += `<button class="pagination-page px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded text-sm transition-colors" data-page="1">1</button>`;

              Toast().show('已保存到 GitHub');
              this.renderCards(state.entries);
            } catch (err) {
              Toast().show(`保存失败: ${err.message}`, 'error');
              this.renderCards(state.entries);
            }
          });
        },

        setEditMode(card, isEdit) {
          const viewModes = card.querySelectorAll('.view-mode');
          const editModes = card.querySelectorAll('.edit-mode');
          const editBtn = card.querySelector('.edit-btn');
          const saveBtn = card.querySelector('.save-btn');
          const cancelBtn = card.querySelector('.cancel-btn');

          viewModes.forEach(el => el.classList.toggle('hidden', isEdit));
          editModes.forEach(el => el.classList.toggle('hidden', !isEdit));
          editBtn.classList.toggle('hidden', isEdit);
          saveBtn.classList.toggle('hidden', !isEdit);
          cancelBtn.classList.toggle('hidden', !isEdit);
        },

        collectEntryFromCard(card, originalEntry) {
          const weatherInput = card.querySelector('.weather-input').value;
          const sleepInput = card.querySelector('.sleep-input').value;
          const dietInput = card.querySelector('.diet-input').value;
          const exerciseInput = card.querySelector('.exercise-input').value;
          const noteInput = card.querySelector('.note-input').value;
          const specialNotesInput = card.querySelector('.special-notes-input').value;

          const specialNotes = [];
          specialNotesInput.split('\n').forEach(line => {
            const trimLine = line.trim();
            if (trimLine.startsWith('[!]')) {
              specialNotes.push({ type: '!', text: trimLine.substring(4).trim() });
            } else if (trimLine.startsWith('[?]')) {
              specialNotes.push({ type: '?', text: trimLine.substring(4).trim() });
            } else if (trimLine.startsWith('[+]')) {
              specialNotes.push({ type: '+', text: trimLine.substring(4).trim() });
            }
          });

          return {
            date: originalEntry.date,
            weather: Parser().parseWeather(weatherInput),
            sleep: Parser().parseSleep(sleepInput),
            diet: Parser().parseDiet(dietInput),
            exercise: exerciseInput,
            note: noteInput,
            specialNotes
          };
        },

        formatWeather(weather) {
          if (!weather.description && weather.tempLow === null) {
            return '-';
          }
          let result = weather.description || '';
          if (weather.tempLow !== null && weather.tempHigh !== null) {
            result += `，${weather.tempLow}-${weather.tempHigh}℃`;
          }
          if (weather.note) {
            result += ` （${weather.note}）`;
          }
          return result || '-';
        },

        formatSleep(sleep) {
          if (!sleep.sleepTime && !sleep.wakeTime) {
            return sleep.note ? `（${sleep.note}）` : '-';
          }
          let result = `${sleep.sleepTime} 睡着 → ${sleep.wakeTime} ${sleep.wakeType}`;
          if (sleep.note) {
            result += `（${sleep.note}）`;
          }
          return result;
        },

        formatDiet(diet) {
          if (!diet.lunch && !diet.dinner) {
            return '-';
          }
          return `午饭：${diet.lunch || '-'}\n晚饭：${diet.dinner || '-'}`;
        },

        reconstructWeather(weather) {
          let result = weather.description;
          if (weather.tempLow !== null && weather.tempHigh !== null) {
            result += `，${weather.tempLow}-${weather.tempHigh}℃`;
          }
          if (weather.note) {
            result += ` （${weather.note}）`;
          }
          return result;
        },

        reconstructSleep(sleep) {
          if (!sleep.sleepTime && !sleep.wakeTime) {
            if (sleep.note) {
              return `: 睡着，: 苏醒/闹钟（${sleep.note}）`;
            }
            return ': 睡着，: 苏醒/闹钟';
          }
          let result = `${sleep.sleepTime} 睡着，${sleep.wakeTime} ${sleep.wakeType}`;
          if (sleep.note) {
            result += `（${sleep.note}）`;
          }
          return result;
        },

        reconstructDiet(diet) {
          return `午饭：${diet.lunch || ''}、晚饭：${diet.dinner || ''}`;
        }
      };
    }

    function SidebarManager() {
      const renderer = Renderer();
      const stringifier = Stringifier();
      const weatherService = WeatherService();

      return {
        open() {
          document.getElementById('sidebarOverlay').classList.add('active');
          document.getElementById('sidebar').classList.add('active');
          this.initForm();
        },

        close() {
          document.getElementById('sidebarOverlay').classList.remove('active');
          document.getElementById('sidebar').classList.remove('active');
        },

        initForm() {
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth() + 1;
          const day = now.getDate();
          document.getElementById('entryDate').value = `${year}.${month}.${day}`;

          document.getElementById('weatherDesc').value = '';
          document.getElementById('weatherTempLow').value = '';
          document.getElementById('weatherTempHigh').value = '';
          document.getElementById('sleepHour').value = '';
          document.getElementById('sleepMin').value = '';
          document.getElementById('wakeHour').value = '';
          document.getElementById('wakeMin').value = '';
          document.getElementById('sleepNote').value = '';
          document.getElementById('dietLunch').value = '';
          document.getElementById('dietDinner').value = '';
          document.getElementById('exercise').value = '';
          document.getElementById('note').value = '';
          document.getElementById('specialNoteText').value = '';

          state.wakeType = '苏醒';
          state.formSpecialNotes = [];
          this.updateWakeTypeButtons();
          this.renderSpecialNotesList();
        },

        updateWakeTypeButtons() {
          const awakeBtn = document.getElementById('wakeTypeAwake');
          const alarmBtn = document.getElementById('wakeTypeAlarm');

          if (state.wakeType === '苏醒') {
            awakeBtn.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
            awakeBtn.classList.add('bg-blue-500', 'text-white');
            alarmBtn.classList.remove('bg-blue-500', 'text-white');
            alarmBtn.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
          } else {
            alarmBtn.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
            alarmBtn.classList.add('bg-blue-500', 'text-white');
            awakeBtn.classList.remove('bg-blue-500', 'text-white');
            awakeBtn.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
          }
        },

        renderSpecialNotesList() {
          const container = document.getElementById('specialNotesList');
          container.innerHTML = state.formSpecialNotes.map((note, index) => {
            const colorClass = note.type === '+' ? 'bg-green-100 text-green-800' : note.type === '?' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800';
            return `
              <div class="flex items-center justify-between px-3 py-2 rounded ${colorClass}">
                <span>[${note.type}] ${note.text}</span>
                <button type="button" class="remove-special-note hover:opacity-70" data-index="${index}">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
            `;
          }).join('');

          container.querySelectorAll('.remove-special-note').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const index = parseInt(e.currentTarget.dataset.index);
              state.formSpecialNotes.splice(index, 1);
              this.renderSpecialNotesList();
            });
          });
        },

        addSpecialNote(type) {
          const textInput = document.getElementById('specialNoteText');
          const text = textInput.value.trim();
          if (!text) {
            Toast().show('请先输入标注内容', 'error');
            return;
          }
          state.formSpecialNotes.push({ type, text });
          textInput.value = '';
          this.renderSpecialNotesList();
        },

        async queryWeather() {
          const postalCode = state.postalCode || Storage().get(STORAGE_KEYS.postalCode) || '';
          const result = await weatherService.query(postalCode);
          if (result) {
            document.getElementById('weatherDesc').value = result.description;
            document.getElementById('weatherTempLow').value = result.tempLow;
            document.getElementById('weatherTempHigh').value = result.tempHigh;
            Toast().show('天气已填充');
          }
        },

        validateDate(date) {
          return state.entries.some(entry => entry.date === date);
        },

        async handleSubmit() {
          const date = document.getElementById('entryDate').value.trim();

          if (!date) {
            Toast().show('请输入日期', 'error');
            return;
          }

          const datePattern = /^(\d{4})\.(\d{1,2})\.(\d{1,2})$/;
          if (!datePattern.test(date)) {
            Toast().show('日期格式错误，请使用 yyyy.m.d 格式', 'error');
            return;
          }

          if (this.validateDate(date)) {
            Toast().show('该日期的记录已存在，请修改日期或编辑现有记录', 'error');
            return;
          }

          const weatherDesc = document.getElementById('weatherDesc').value.trim();
          const weatherTempLow = document.getElementById('weatherTempLow').value.trim();
          const weatherTempHigh = document.getElementById('weatherTempHigh').value.trim();

          const sleepHour = document.getElementById('sleepHour').value.trim();
          const sleepMin = document.getElementById('sleepMin').value.trim();
          const wakeHour = document.getElementById('wakeHour').value.trim();
          const wakeMin = document.getElementById('wakeMin').value.trim();
          const sleepNote = document.getElementById('sleepNote').value.trim();

          const dietLunch = document.getElementById('dietLunch').value.trim();
          const dietDinner = document.getElementById('dietDinner').value.trim();

          const exercise = document.getElementById('exercise').value.trim();
          const note = document.getElementById('note').value.trim();

          const newEntry = {
            date,
            weather: {
              description: weatherDesc,
              tempLow: weatherTempLow ? parseInt(weatherTempLow) : null,
              tempHigh: weatherTempHigh ? parseInt(weatherTempHigh) : null,
              note: ''
            },
            sleep: {
              sleepTime: (sleepHour && sleepMin) ? `${sleepHour}:${sleepMin}` : '',
              wakeTime: (wakeHour && wakeMin) ? `${wakeHour}:${wakeMin}` : '',
              wakeType: (sleepHour && sleepMin) || (wakeHour && wakeMin) ? state.wakeType : '',
              note: sleepNote
            },
            diet: {
              lunch: dietLunch,
              dinner: dietDinner
            },
            exercise,
            note,
            specialNotes: [...state.formSpecialNotes]
          };

          state.entries.push(newEntry);
          state.currentPage = 1;
          this.close();

          try {
            const content = stringifier.stringifyAll(state.entries);
            const result = await Api().putFile(content, `添加健康日志 - ${date}`);
            Storage().saveSha(result.content.sha);
            renderer.renderCards(state.entries);
            Toast().show('已保存到 GitHub');
          } catch (err) {
            Toast().show(`保存失败: ${err.message}`, 'error');
            state.entries.pop();
            renderer.renderCards(state.entries);
          }
        }
      };
    }

    async function loadData() {
      if (!Storage().hasConfig()) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('cardsContainer').innerHTML = '';

      try {
        const data = await Api().getFile();
        Storage().saveSha(data.sha);

        const content = decodeURIComponent(escape(atob(data.content)));
        state.entries = Parser().parse(content);

        Renderer().renderCards(state.entries);
      } catch (err) {
        Toast().show(`加载失败: ${err.message}`, 'error');
        document.getElementById('emptyState').classList.remove('hidden');
      } finally {
        document.getElementById('loadingState').classList.add('hidden');
      }
    }

    async function saveAll() {
      if (state.entries.length === 0) {
        Toast().show('没有可保存的数据', 'error');
        return;
      }

      try {
        const content = Stringifier().stringifyAll(state.entries);
        const result = await Api().putFile(content, '保存健康日志 - 全部更新');
        Storage().saveSha(result.content.sha);
        Toast().show('已保存到 GitHub');
      } catch (err) {
        Toast().show(`保存失败: ${err.message}`, 'error');
      }
    }

    const sidebarManager = SidebarManager();

    document.addEventListener('DOMContentLoaded', () => {
      Storage().loadConfig();

      document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('tokenInput').value = state.config.token;
        document.getElementById('usernameInput').value = state.config.username;
        document.getElementById('repoInput').value = state.config.repo;
        document.getElementById('pathInput').value = state.config.path;
        document.getElementById('postalCode').value = state.postalCode;
        document.getElementById('settingsOverlay').classList.add('active');
      });

      document.getElementById('closeSettingsBtn').addEventListener('click', () => {
        document.getElementById('settingsOverlay').classList.remove('active');
      });

      document.getElementById('settingsOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('settingsOverlay')) {
          document.getElementById('settingsOverlay').classList.remove('active');
        }
      });

      document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        state.config.token = document.getElementById('tokenInput').value.trim();
        state.config.username = document.getElementById('usernameInput').value.trim();
        state.config.repo = document.getElementById('repoInput').value.trim();
        state.config.path = document.getElementById('pathInput').value.trim();
        const postalCode = document.getElementById('postalCode').value.trim();

        Storage().saveConfig();
        Storage().saveLocation(postalCode);
        document.getElementById('settingsOverlay').classList.remove('active');
        Toast().show('设置已保存');
        loadData();
      });

      document.getElementById('emptySettingsBtn').addEventListener('click', () => {
        document.getElementById('settingsBtn').click();
      });

      document.getElementById('refreshBtn').addEventListener('click', () => {
        loadData();
      });

      document.getElementById('saveAllBtn').addEventListener('click', () => {
        saveAll();
      });

      document.getElementById('menuBtn').addEventListener('click', () => {
        sidebarManager.open();
      });

      document.getElementById('closeSidebarBtn').addEventListener('click', () => {
        sidebarManager.close();
      });

      document.getElementById('sidebarOverlay').addEventListener('click', () => {
        sidebarManager.close();
      });

      document.getElementById('wakeTypeAwake').addEventListener('click', () => {
        state.wakeType = '苏醒';
        sidebarManager.updateWakeTypeButtons();
      });

      document.getElementById('wakeTypeAlarm').addEventListener('click', () => {
        state.wakeType = '闹钟';
        sidebarManager.updateWakeTypeButtons();
      });

      document.getElementById('addSpecialPlus').addEventListener('click', () => {
        sidebarManager.addSpecialNote('+');
      });

      document.getElementById('addSpecialQuestion').addEventListener('click', () => {
        sidebarManager.addSpecialNote('?');
      });

      document.getElementById('addSpecialExclamation').addEventListener('click', () => {
        sidebarManager.addSpecialNote('!');
      });

      document.getElementById('addEntryForm').addEventListener('submit', (e) => {
        e.preventDefault();
        sidebarManager.handleSubmit();
      });

      document.getElementById('queryWeatherBtn').addEventListener('click', () => {
        sidebarManager.queryWeather();
      });

      loadData();
    });
  </script>
</body>
